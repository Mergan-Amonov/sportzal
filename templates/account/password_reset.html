<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Parolni tiklash | FitClub</title>
    <link rel="preconnect" href="https://api.fontshare.com">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d14; --surface: #171722; --border: #2a2a3a;
            --text: #f0f0f8; --muted: #6b6b85; --accent: #e63946;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Geist', sans-serif; font-size: 14px;
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; padding: 24px;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(42,42,58,.4) 1px, transparent 1px), linear-gradient(90deg, rgba(42,42,58,.4) 1px, transparent 1px);
            background-size: 48px 48px; pointer-events: none; z-index: 0;
        }
        .wrap { position: relative; z-index: 1; width: 100%; max-width: 400px; }
        .brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 36px; }
        .brand-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .brand-name { font-family: 'Satoshi', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 36px 32px; }
        .card-title { font-family: 'Satoshi', sans-serif; font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        .card-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
        .form-label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
        .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'Geist', sans-serif; font-size: 13px; padding: 10px 12px; border-radius: 8px; outline: none; transition: border-color .12s; margin-bottom: 16px; }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: var(--muted); }
        .btn-submit { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: 'Geist', sans-serif; font-size: 14px; font-weight: 500; padding: 11px; cursor: pointer; transition: background .12s; }
        .btn-submit:hover { background: #c1121f; }
        .back-link { text-align: center; margin-top: 16px; font-size: 12px; color: var(--muted); }
        .back-link a { color: var(--muted); text-decoration: none; }
        .back-link a:hover { color: var(--text); }
    </style>
</head>
<body>
<div class="wrap">
    <div class="brand">
        <div class="brand-icon">⚡</div>
        <span class="brand-name">FitClub</span>
    </div>
    <div class="card">
        <div class="card-title">Parolni tiklash</div>
        <div class="card-subtitle">Email manzilingizni kiriting — tiklash havolasini yuboramiz.</div>
        <form method="post">
            {% csrf_token %}
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-input" placeholder="email@example.com" autofocus>
            <button type="submit" class="btn-submit">Havola yuborish</button>
        </form>
    </div>
    <div class="back-link">
        <a href="{% url 'login' %}">← Kirish sahifasiga qaytish</a>
    </div>
</div>
</body>
</html>
