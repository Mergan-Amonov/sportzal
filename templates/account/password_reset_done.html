<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Havola yuborildi | FitClub</title>
    <link rel="preconnect" href="https://api.fontshare.com">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d14; --surface: #171722; --border: #2a2a3a; --text: #f0f0f8; --muted: #6b6b85; --accent: #e63946; --success: #22c55e; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Geist', sans-serif; font-size: 14px; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(42,42,58,.4) 1px, transparent 1px), linear-gradient(90deg, rgba(42,42,58,.4) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index: 0; }
        .wrap { position: relative; z-index: 1; width: 100%; max-width: 400px; text-align: center; }
        .icon { font-size: 48px; margin-bottom: 24px; }
        .title { font-family: 'Satoshi', sans-serif; font-size: 20px; font-weight: 600; margin-bottom: 12px; }
        .desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }
        .btn { display: inline-block; background: var(--accent); color: #fff; border-radius: 8px; font-size: 14px; font-weight: 500; padding: 10px 24px; text-decoration: none; transition: background .12s; }
        .btn:hover { background: #c1121f; color: #fff; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="icon">📧</div>
    <div class="title">Havola yuborildi</div>
    <div class="desc">Agar bu email tizimda ro'yxatdan o'tgan bo'lsa, parol tiklash havolasi yuborildi. Spam papkasini ham tekshiring.</div>
    <a href="{% url 'login' %}" class="btn">Kirish sahifasiga qaytish</a>
</div>
</body>
</html>
